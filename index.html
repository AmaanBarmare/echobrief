<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoBrief - AI Meeting Recorder</title>
    <meta name="description" content="Meeting summaries in 22 Indian languages. Auto-join Meet, Zoom & Teams. Delivered to Slack, WhatsApp, or email." />
    <meta name="author" content="EchoBrief" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:title" content="EchoBrief — Meeting summaries that actually make sense" />
    <meta property="og:description" content="Meeting summaries in 22 Indian languages. Auto-join Meet, Zoom & Teams. Delivered to Slack, WhatsApp, or email." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/echobrief-logo-light.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EchoBrief" />
    <meta name="twitter:image" content="/echobrief-logo-light.svg" />

    <!-- Fonts: Switzer (body + headings) from Fontshare, JetBrains Mono from Google Fonts -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500,600,700,800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&family=Noto+Sans+Tamil:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <script>
      (function () {
        try {
          var k = 'echobrief-theme';
          var t = localStorage.getItem(k);
          var r = 'dark';
          if (t === 'light') r = 'light';
          else if (t === 'dark') r = 'dark';
          else r = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.classList.add(r);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
